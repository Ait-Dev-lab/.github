<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Ait-Dev-lab" }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Default: Dark mode */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
            padding: 2rem;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .container { max-width: 900px; margin: 0 auto; }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }
        hr { border-color: #334155; margin: 2rem 0 1rem; }
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #64748b;
            font-size: 0.75rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th { background: #334155; }
        code {
            background: #1e293b;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
        }
        @media (max-width: 600px) {
            body { padding: 1rem; }
            th, td { padding: 0.5rem; font-size: 0.85rem; }
        }
        
        /* Light mode - when user prefers light */
        @media (prefers-color-scheme: light) {
            body {
                background: #f8fafc;
                color: #0f172a;
            }
            hr { border-color: #e2e8f0; }
            .footer { color: #94a3b8; }
            table { background: #ffffff; }
            th, td { border-bottom: 1px solid #e2e8f0; }
            th { background: #f1f5f9; color: #0f172a; }
            code { background: #f1f5f9; }
            a { color: #2563eb; }
        }
    </style>
</head>
<body>
    <div class="container">
        {{ content }}
        <div class="footer">
            <hr>
            <p>Ait-Dev-lab · Browser-native AI research · Hosted on GitHub Pages</p>
        </div>
    </div>
</body>
</html>
